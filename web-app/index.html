<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Vector Tracker</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background-color: #000;
            color: #0f0; font-family: "Courier New", Courier, monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; user-select: none;
        }
        #compass-container {
            display: none; align-items: center; justify-content: center;
            /* Додаємо невелике загальне світіння для радару */
            filter: drop-shadow(0 0 5px rgba(0, 255, 0, 0.3));
        }
        /* Стилізація сегментів SVG */
        .segment {
            fill: rgba(0, 255, 0, 0.05); /* Ледь помітний фон у стані спокою */
            stroke: #0f0;
            stroke-width: 1.5;
            transition: fill 0.15s ease-out, filter 0.15s ease-out;
        }
        .segment.active {
            fill: #0f0;
            filter: drop-shadow(0 0 15px #0f0);
        }
        #init-btn {
            background-color: transparent; color: #0f0;
            border: 2px solid #0f0; padding: 15px 30px;
            font-size: 1.5rem; font-family: inherit; cursor: pointer;
            box-shadow: 0 0 10px #0f0 inset, 0 0 10px #0f0; transition: all 0.2s ease;
        }
        #init-btn:hover { background-color: #0f0; color: #000; }
        #terminal-log {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 1rem; opacity: 0.8; white-space: pre;
        }
    </style>
</head>
<body>

    <button id="init-btn">INIT_RADAR</button>
    
    <div id="compass-container">
        <!-- Радар на 8 сегментів (кожен по 45 градусів) -->
        <svg viewBox="-110 -110 220 220" width="300" height="300">
            <!-- Сегменти генеруються через path. -38.27 та -92.39 це синуси/косинуси для кута 22.5 градуси -->
            <path id="seg-0" class="segment" d="M 0 0 L -38.27 -92.39 A 100 100 0 0 1 38.27 -92.39 Z" />
            <path id="seg-1" class="segment" transform="rotate(45)" d="M 0 0 L -38.27 -92.39 A 100 100 0 0 1 38.27 -92.39 Z" />
            <path id="seg-2" class="segment" transform="rotate(90)" d="M 0 0 L -38.27 -92.39 A 100 100 0 0 1 38.27 -92.39 Z" />
            <path id="seg-3" class="segment" transform="rotate(135)" d="M 0 0 L -38.27 -92.39 A 100 100 0 0 1 38.27 -92.39 Z" />
            <path id="seg-4" class="segment" transform="rotate(180)" d="M 0 0 L -38.27 -92.39 A 100 100 0 0 1 38.27 -92.39 Z" />
            <path id="seg-5" class="segment" transform="rotate(225)" d="M 0 0 L -38.27 -92.39 A 100 100 0 0 1 38.27 -92.39 Z" />
            <path id="seg-6" class="segment" transform="rotate(270)" d="M 0 0 L -38.27 -92.39 A 100 100 0 0 1 38.27 -92.39 Z" />
            <path id="seg-7" class="segment" transform="rotate(315)" d="M 0 0 L -38.27 -92.39 A 100 100 0 0 1 38.27 -92.39 Z" />
            
            <!-- Центральна точка радару -->
            <circle cx="0" cy="0" r="12" fill="#000" stroke="#0f0" stroke-width="2" />
            <circle cx="0" cy="0" r="4" fill="#0f0" />
        </svg>
    </div>
    
    <div id="terminal-log">STATUS: STANDBY...</div>

    <script>
        const initBtn = document.getElementById('init-btn');
        const compassContainer = document.getElementById('compass-container');
        const terminalLog = document.getElementById('terminal-log');
        const segments = document.querySelectorAll('.segment');
        
        const HISTORY_SIZE = 15;
        let historyX = [];
        let historyY = [];

        let lastKnownVectorX = 0;
        let lastKnownVectorY = 0;

        const STEP_AMPLITUDE_THRESHOLD = 0.5;

        const getAverage = (arr) => arr.reduce((a, b) => a + b, 0) / arr.length || 0;

        initBtn.addEventListener('click', async () => {
            if (!('LinearAccelerationSensor' in window)) {
                terminalLog.innerText = 'ERR: API_UNAVAILABLE';
                return;
            }

            try {
                if (navigator.permissions) {
                    const result = await navigator.permissions.query({ name: 'accelerometer' });
                    if (result.state === 'denied') {
                        terminalLog.innerText = 'ERR: PERMISSION_DENIED';
                        return;
                    }
                }

                const sensor = new LinearAccelerationSensor({ frequency: 60 });

                sensor.addEventListener('reading', () => {
                    historyX.push(sensor.x);
                    historyY.push(sensor.y);
                    if (historyX.length > HISTORY_SIZE) historyX.shift();
                    if (historyY.length > HISTORY_SIZE) historyY.shift();

                    const avgX = getAverage(historyX);
                    const avgY = getAverage(historyY);

                    if (Math.abs(avgY) > STEP_AMPLITUDE_THRESHOLD || Math.abs(avgX) > STEP_AMPLITUDE_THRESHOLD) {
                        lastKnownVectorY = avgY;
                        lastKnownVectorX = avgX;
                    }

                    terminalLog.innerText = `Raw X: ${sensor.x.toFixed(2)}\nRaw Y: ${sensor.y.toFixed(2)}\nVec X: ${lastKnownVectorX.toFixed(2)}\nVec Y: ${lastKnownVectorY.toFixed(2)}`;
                    // terminalLog.innerText = `VecX: ${lastKnownVectorX.toFixed(2)}\nVecY: ${lastKnownVectorY.toFixed(2)}`;

                    updateUI(lastKnownVectorX, lastKnownVectorY);
                });

                sensor.addEventListener('error', (e) => {
                    terminalLog.innerText = `ERR: ${e.error.name}`;
                });

                sensor.start();
                initBtn.style.display = 'none';
                compassContainer.style.display = 'flex';
                terminalLog.innerText = 'STATUS: TRACKING...';

            } catch (err) {
                terminalLog.innerText = `ERR: ${err.message}`;
            }
        });

        function updateUI(x, y) {
            // Очищуємо всі активні сегменти
            segments.forEach(seg => seg.classList.remove('active'));

            if (x === 0 && y === 0) return; // Немає руху

            // Обчислюємо кут вектора у радіанах.
            // atan2(x, y) зручний тим, що 0 буде "вгору" (Y+), а 90 "вправо" (X+).
            let angleRad = Math.atan2(x, y);
            
            // Конвертуємо у градуси (0-360)
            let angleDeg = angleRad * (180 / Math.PI);
            angleDeg = (angleDeg + 360) % 360;

            // Ділимо коло на 8 секторів по 45 градусів кожен.
            // Округлення допомагає визначити індекс масиву (0 до 7)
            let index = Math.round(angleDeg / 45) % 8;

            // Підсвічуємо потрібний сегмент
            segments[index].classList.add('active');
        }
    </script>
</body>
</html>
